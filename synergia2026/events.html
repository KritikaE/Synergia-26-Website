  <style>
    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(4px);
      z-index: 100;
      overflow-y: auto;
    }
    #modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }

    #modal-box {
      background: rgba(0,0,0,0.97);
      border: 2px solid #ff00ff;
      max-width: 56rem;
      width: 100%;
      margin: auto;
      position: relative;
      animation: modalIn .25s ease;
    }
    @keyframes modalIn {
      from { opacity:0; transform:scale(0.9) translateY(30px); }
      to   { opacity:1; transform:scale(1)   translateY(0); }
    }

    /* ── Tab indicator ── */
    .tab-indicator {
      position: absolute;
      bottom: 8px; left: 16px; right: 16px;
      height: 4px;
      border-radius: 9999px;
    }

    /* ── Event cards fade-in ── */
    .event-card { animation: cardIn .35s ease both; }
    @keyframes cardIn {
      from { opacity:0; transform:translateY(24px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Checklist icon ── */
    .check-icon { width:18px; height:18px; flex-shrink:0; margin-top:2px; }
  </style>
</head>

// ─────────────────────────────────────────────
//  TAB CONFIG
// ─────────────────────────────────────────────
const categories = [
  { label:'Technical', color:'#00ffff' },
  { label:'Cultural',  color:'#ff1493' },
  { label:'Workshop',  color:'#34d399' },
];

let activeCategory = 0;

// ─────────────────────────────────────────────
//  RENDER TABS
// ─────────────────────────────────────────────
function renderTabs() {
  const container = document.getElementById('tab-buttons');
  container.innerHTML = categories.map((cat, i) => {
    const isActive = i === activeCategory;
    return `
      <button
        onclick="switchCategory(${i})"
        class="flex-1 min-w-0 sm:flex-1 max-w-xs py-4 sm:py-10 px-1 sm:px-6 pixel-corners transition-all duration-300 hover:bg-black/60 border-2 flex items-center justify-center relative"
        style="background:${isActive ? 'rgba(0,0,0,0.8)' : 'rgba(0,0,0,0.4)'}; border-color:${cat.color};">
        <div class="font-['Orbitron'] sm:font-['Press_Start_2P'] text-[11px] sm:text-2xl md:text-3xl text-center leading-tight whitespace-normal break-words px-1"
          style="color:${cat.color}; text-shadow:${isActive ? `0 0 10px ${cat.color}` : 'none'};">
          ${cat.label}
        </div>
        ${isActive ? `<div class="tab-indicator" style="background:${cat.color}; box-shadow:0 0 10px ${cat.color};"></div>` : ''}
      </button>`;
  }).join('');
}

// ─────────────────────────────────────────────
//  RENDER EVENTS GRID
// ─────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('events-grid');
  const filtered = events.filter(e => e.category === categories[activeCategory].label);

  grid.innerHTML = filtered.map((ev, i) => `
    <div class="event-card bg-black/60 backdrop-blur-sm p-4 sm:p-8 pixel-corners cursor-pointer transition-all duration-300 hover:bg-black/80 border-2 overflow-hidden h-full flex flex-col"
      style="border-color:${ev.color}60; animation-delay:${i * 0.05}s;"
      onclick="openModal('${ev.id}')">
      <div class="mb-4 sm:mb-6 w-full h-40 sm:h-64 overflow-hidden pixel-corners bg-black">
        <img src="${ev.poster}" alt="${ev.title}" class="w-full h-full object-contain transition-transform duration-300"
          onerror="this.style.display='none'">
      </div>
      <h3 class="font-['Orbitron'] text-base sm:text-xl md:text-2xl mb-3 sm:mb-4 leading-tight break-words min-h-[2.75rem] sm:min-h-[3.5rem]" style="color:${ev.color};">
        ${ev.title}
      </h3>
      <p class="font-['Rajdhani'] text-xs sm:text-base text-gray-300 mb-4 sm:mb-6 break-words leading-snug min-h-[2.5rem] sm:min-h-[3rem]">${ev.description}</p>
      <div class="mt-auto flex flex-col gap-2">
        <button
          class="neon-button font-['Orbitron'] text-[10px] sm:text-sm w-full px-2 sm:px-6 py-2 border-2 pixel-corners hover:scale-105 transition-all duration-300"
          style="color:${ev.color}; border-color:${ev.color};"
          onclick="event.stopPropagation(); openModal('${ev.id}')">
          VIEW DETAILS
        </button>
        ${ev.registrationLink ? `
        <a href="${ev.registrationLink}" target="_blank" rel="noopener noreferrer"
          class="neon-button font-['Orbitron'] text-[10px] sm:text-sm w-full px-2 sm:px-6 py-2 border-2 pixel-corners hover:scale-105 transition-all duration-300 text-center"
          style="color:#00ff00; border-color:#00ff00; text-shadow:0 0 5px #00ff00;"
          onclick="event.stopPropagation()">
          REGISTER NOW
        </a>` : ''}
      </div>
    </div>`
  ).join('');
}

function switchCategory(index) {
  activeCategory = index;
  renderTabs();
  renderGrid();
}

// ─────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────
function openModal(id) {
  const ev = events.find(e => e.id === id);
  if (!ev) return;

  // Set border colour on modal box & corners
  document.getElementById('modal-box').style.borderColor = ev.color;
  ['corner-tl','corner-tr','corner-bl','corner-br'].forEach(c => {
    document.getElementById(c).style.borderColor = ev.color;
  });

  document.getElementById('modal-content').innerHTML = `
    <!-- Header -->
    <div class="mb-6 sm:mb-8 pr-10">
      <div class="inline-block mb-3">
        <span class="font-['Press_Start_2P'] text-[8px] sm:text-[10px] px-3 py-1 border-2 pixel-corners"
          style="color:${ev.color}; border-color:${ev.color};">
          ${ev.category.toUpperCase()}
        </span>
      </div>
      <h2 class="font-['Press_Start_2P'] text-xl sm:text-2xl md:text-3xl leading-tight mt-3"
        style="color:${ev.color}; text-shadow:0 0 20px ${ev.color};">
        ${ev.title}
      </h2>
    </div>

    <!-- Poster -->
    ${ev.poster ? `
    <div class="mb-6 flex justify-center">
      <img src="${ev.poster}" alt="${ev.title}"
        class="w-full max-h-[400px] object-contain rounded-lg border border-gray-700"
        onerror="this.parentElement.style.display='none'">
    </div>` : ''}

    <!-- Info grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6 sm:mb-8">
      ${ev.dateTime ? `
      <div class="neon-border-blue bg-black/40 p-4 pixel-corners">
        <div class="font-['Orbitron'] text-sm text-[#00ffff] mb-1">DATE &amp; TIME</div>
        <div class="font-['Rajdhani'] text-sm text-gray-300">${ev.dateTime}</div>
      </div>` : ''}
      ${ev.venue ? `
      <div class="neon-border-purple bg-black/40 p-4 pixel-corners">
        <div class="font-['Orbitron'] text-sm text-[#ff00ff] mb-1">VENUE</div>
        <div class="font-['Rajdhani'] text-sm text-gray-300">${ev.venue}</div>
      </div>` : ''}
      ${ev.eligibility ? `
      <div class="neon-border-pink bg-black/40 p-4 pixel-corners sm:col-span-2">
        <div class="font-['Orbitron'] text-sm text-[#ff1493] mb-1">ELIGIBILITY</div>
        <div class="font-['Rajdhani'] text-sm text-gray-300">${ev.eligibility}</div>
      </div>` : ''}
    </div>

    <!-- Description -->
    ${ev.fullDescription ? `
    <div class="mb-6 sm:mb-8">
      <h3 class="font-['Orbitron'] text-lg sm:text-xl text-[#00ffff] mb-3">ABOUT</h3>
      <p class="font-['Rajdhani'] text-base sm:text-lg text-gray-300 leading-relaxed">${ev.fullDescription}</p>
    </div>` : `
    <div class="mb-6 sm:mb-8">
      <h3 class="font-['Orbitron'] text-lg sm:text-xl text-[#00ffff] mb-3">ABOUT</h3>
      <p class="font-['Rajdhani'] text-base sm:text-lg text-gray-300 leading-relaxed">${ev.description}</p>
    </div>`}

    <!-- Rules -->
    ${ev.rules && ev.rules.length ? `
    <div class="mb-6 sm:mb-8">
      <h3 class="font-['Orbitron'] text-lg sm:text-xl text-[#ff1493] mb-4">RULES &amp; GUIDELINES</h3>
      <div style="display:flex; flex-direction:column; gap:.75rem;">
        ${ev.rules.map(rule => `
        <div style="display:flex; align-items:flex-start; gap:.75rem;">
          <svg class="check-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="${ev.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <span class="font-['Rajdhani'] text-sm sm:text-base text-gray-300">${rule}</span>
        </div>`).join('')}
      </div>
    </div>` : ''}

    <!-- Buttons -->
    <div class="flex flex-col sm:flex-row gap-4 pt-6 border-t border-gray-700">
      ${ev.registrationLink ? `
      <a href="${ev.registrationLink}" target="_blank" rel="noopener noreferrer"
        class="neon-button neon-border-purple bg-black/60 px-6 sm:px-8 py-3 sm:py-4 font-['Orbitron'] text-sm sm:text-base text-[#ff00ff] hover:bg-[#ff00ff]/20 transition-all duration-300 pixel-corners flex-1 text-center"
        style="display:block;">
        REGISTER NOW
      </a>` : `
      <button
        class="neon-button neon-border-purple bg-black/60 px-6 sm:px-8 py-3 sm:py-4 font-['Orbitron'] text-sm sm:text-base text-[#ff00ff] pixel-corners flex-1"
        onclick="alert('Registration for ${ev.title} will open soon!')">
        REGISTER NOW
      </button>`}
      <button onclick="closeModal()"
        class="neon-button neon-border-blue bg-black/60 px-6 sm:px-8 py-3 sm:py-4 font-['Orbitron'] text-sm sm:text-base text-[#00ffff] hover:bg-[#00ffff]/20 transition-all duration-300 pixel-corners">
        CLOSE
      </button>
    </div>
  `;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
renderTabs();
renderGrid();
</script>
</body>
</html>
