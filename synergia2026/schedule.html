 <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    .schedule-title {
      text-align: center;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 700;
      margin-bottom: 4rem;
      letter-spacing: 0.2em;
      font-family: 'Press Start 2P', cursive;
      color: #a855f7;
      text-shadow: 0 0 10px #a855f7, 0 0 20px #a855f7, 0 0 40px #7e22ce;
      opacity: 0;
      transform: translateY(-30px);
      animation: fadeSlideDown 0.6s ease forwards;
    }

    @keyframes fadeSlideDown {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tab-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      max-width: 48rem;
      margin: 0 auto 4rem;
    }

    @media (min-width: 768px) {
      .tab-grid { grid-template-columns: 1fr 1fr; }
    }

    .tab-btn {
      padding: 1.5rem;
      border: 2px solid #1f2937;
      background: #131313;
      color: white;
      cursor: pointer;
      transition: all 0.3s;
      text-align: left;
    }

    .tab-btn:hover { border-color: #4b5563; }

    .tab-btn.active {
      border-color: #ec4899;
      background: rgba(131, 24, 67, 0.2);
      box-shadow: 0 0 20px rgba(236, 72, 153, 0.4);
    }

    .tab-btn .day-label { font-size: 0.75rem; letter-spacing: 0.2em; }
    .tab-btn .day-theme { font-size: 1.125rem; font-weight: 700; margin-top: 0.25rem; }

    .events-container { max-width: 56rem; margin: 0 auto; }

    .event-row {
      display: flex;
      align-items: flex-start;
      gap: 1.5rem;
      opacity: 0;
      animation: fadeSlideUp 0.5s ease forwards;
    }

    .event-time {
      width: 12rem;
      padding-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.5rem;
      font-size: 0.875rem;
      color: #d1d5db;
      font-family: monospace;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .clock-icon { color: #22d3ee; flex-shrink: 0; width: 16px; height: 16px; }

    .timeline-line {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 0.75rem;
      flex-shrink: 0;
    }

    .timeline-dot {
      width: 1rem;
      height: 1rem;
      border-radius: 50%;
      background: #22d3ee;
      box-shadow: 0 0 15px rgba(34, 211, 238, 1);
      z-index: 10;
    }

    .timeline-stem {
      width: 2px;
      flex: 1;
      min-height: 60px;
      background: rgba(22, 78, 99, 0.5);
      margin-top: 0.5rem;
    }

    .event-card {
      flex: 1;
      background: #131313;
      padding: 1.5rem;
      border-radius: 0.5rem;
      border: 1px solid #1f2937;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
    }

    .event-category {
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .cat-technical   { color: #4ade80; }
    .cat-competition { color: #facc15; }
    .cat-workshop    { color: #c084fc; }
    .cat-keynote     { color: #f472b6; }
    .cat-hackathon   { color: #22d3ee; }

    .event-title { font-size: 1rem; font-weight: 600; margin-top: 0.5rem; color: white; }

    .event-venue {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
      font-size: 0.75rem;
      color: #9ca3af;
    }

    .map-icon { width: 14px; height: 14px; color: #9ca3af; flex-shrink: 0; }

    .space-y-8 > * + * { margin-top: 2rem; }

    @media (max-width: 640px) {
      .event-time { display: none; }
      .event-row { gap: 0.75rem; }
    }
  </style>
</head>

<script src="script.js"></script>

<script>
  const days = [
    {
      title: "DAY 1", theme: "TECHNICAL", date: "MARCH 31, 2026",
      events: [
        { time: "9:00 AM – 4:30 PM",  title: "ChipAI-NewGen",   category: "Technical",  venue: "OPAL Block Simulation Lab" },
        { time: "10:00 AM – 1:00 PM", title: "BuildSphere",      category: "Technical",  venue: "SMB- 102, 103" },
        { time: "10:00 AM onwards",   title: "AlgoHack 1.O",     category: "Technical",  venue: "SMB training Hall" },
        { time: "10:00 AM – 1:00 PM", title: "Code & Escape",    category: "Technical",  venue: "Pearl Block, 1st floor" },
        { time: "10:00 AM – 1:00 PM", title: "Chaos2Clarity",    category: "Technical",  venue: "SMB-207" },
        { time: "10:00 AM – 4:00 PM", title: "Innoventure",      category: "Technical",  venue: "BFSI Hall" },
        { time: "10:00 AM onwards",   title: "EmbedX",           category: "Technical",  venue: "SSH1" },
        { time: "10:30 AM – 12:30 PM",title: "Raconteur",        category: "Technical",  venue: "JADE BLOCK" },
        { time: "11:00 AM – 12:00 PM & 1:00 PM - 3:00 PM", title: "Hardware Hustle", category: "Technical", venue: "Emerald block, Simulation lab" },
        { time: "11:00 AM – 1:30 PM", title: "Trash2Tech",       category: "Technical",  venue: "BFSI hall 2" },
      ]
    },
    {
      title: "DAY 2", theme: "CULTURAL & WORKSHOPS", date: "APRIL 01, 2026",
      events: [
        { time: "10:00 AM onwards",   title: "Battle of Bands",                         category: "Competition", venue: "Kalavedika" },
        { time: "10:00 AM onwards",   title: "Svarautsav",                              category: "Competition", venue: "SMB Seminar Hall 4th floor" },
        { time: "10:00 AM onwards",   title: "Thandav (Western) & Thandav (Classical)", category: "Competition", venue: "Main Stage" },
        { time: "10:00 AM onwards",   title: "Chitraang 2.0",                           category: "Competition", venue: "SMB Training hall 4th floor" },
        { time: "10:00 AM onwards",   title: "PicIt",                                   category: "Competition", venue: "Jade Block 104" },
        { time: "10:00 AM onwards",   title: "AlgoHack 1.O",                            category: "Technical",   venue: "SMB training Hall" },
        { time: "10:00 AM – 4:00 PM", title: "Pottery Paradise",                        category: "Workshop",    venue: "Beside KALA VEDIKA" },
        { time: "10:00 AM – 4:00 PM", title: "Candle Making",                           category: "Workshop",    venue: "JADE BLOCK" },
        { time: "10:00 AM – 4:00 PM", title: "Candle Holder Decoration",                category: "Workshop",    venue: "SMB Lawn" },
        { time: "10:00 AM – 4:00 PM", title: "Fabric Painting",                         category: "Workshop",    venue: "DB Drawing Hall" },
      ]
    }
  ];

  const categoryClass = {
    Technical:   "cat-technical",
    Competition: "cat-competition",
    Workshop:    "cat-workshop",
    Keynote:     "cat-keynote",
    Hackathon:   "cat-hackathon",
  };

  const clockSVG = `<svg class="clock-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
  const mapSVG   = `<svg class="map-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;

  let activeTab = 0;

  function switchTab(index) {
    activeTab = index;
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
      btn.classList.toggle('active', i === index);
    });
    renderEvents();
  }

  function renderEvents() {
    const container = document.getElementById('events-container');
    const events = days[activeTab].events;
    container.innerHTML = `<div class="space-y-8">${events.map((e, i) => `
      <div class="event-row" style="animation-delay: ${i * 0.1}s">
        <div class="event-time">${clockSVG} ${e.time}</div>
        <div class="timeline-line">
          <div class="timeline-dot"></div>
          <div class="timeline-stem"></div>
        </div>
        <div class="event-card">
          <span class="event-category ${categoryClass[e.category] || ''}">${e.category}</span>
          <h4 class="event-title">${e.title}</h4>
          <div class="event-venue">${mapSVG} ${e.venue}</div>
        </div>
      </div>
    `).join('')}</div>`;
  }

  renderEvents();
</script>
